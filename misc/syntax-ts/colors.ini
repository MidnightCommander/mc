# Tree-sitter capture name to MC color mappings.
#
# Each grammar has its own section with explicit color definitions.
# No [default] inheritance -- each section is self-contained.
# Captures are mapped to match MC's original legacy syntax colors.
#
# Format: capture_name = foreground;background
# Background omitted = inherits editor default.
# Uses the 16 ANSI colors: black, red, green, yellow, blue, magenta,
#   cyan, white, brightblack, brightred, brightgreen, brightyellow,
#   brightblue, brightmagenta, brightcyan, brightwhite
# Plus MC extras: brown, lightgray

[ada]
comment = brown;
constant.builtin = brightmagenta;
delimiter = brightcyan;
function.special = brightred;
keyword = yellow;
label = cyan;
property = brightcyan;
string = green;
string.special = brightgreen;

