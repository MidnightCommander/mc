# Sample INI file demonstrating syntax highlighting features
# Exercises all tree-sitter captures from ini-highlights.scm

; This is also a comment (semicolon style)

[general]
name = My Application
version = 1.0.0
debug = false

[database]
host = localhost
port = 5432
name = mydb
user = admin
password = secret123

[server]
address = 0.0.0.0
port = 8080
max_connections = 100
timeout = 30

[logging]
level = info
file = /var/log/app.log
format = json
rotate = true

[paths]
home = /home/user
data = /var/data
cache = /tmp/cache
config = /etc/app/config

[features]
enable_api = true
enable_web = false
rate_limit = 1000
retry_count = 3

[email]
smtp_host = mail.example.com
smtp_port = 587
from = noreply@example.com
use_tls = true

# Section with special characters in values
[urls]
api = https://api.example.com/v1
docs = https://docs.example.com
webhook = https://hooks.example.com/notify

[limits]
max_size = 104857600
max_age = 86400
threshold = 0.95
