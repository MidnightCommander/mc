# Database configuration
! This is also a comment (exclamation mark style)

# Simple key=value pairs
db.host=localhost
db.port=5432
db.name=myapp_production
db.driver=org.postgresql.Driver

# Using colon separator
app.name: My Application
app.version: 2.1.0
app.debug: false

# Boolean values
feature.enabled=true
feature.disabled=false
maintenance.mode=true

# Numeric values
server.port=8080
max.connections=100
timeout.seconds=30

# Unicode escape sequences
greeting=\u0048\u0065\u006C\u006C\u006F
japanese.text=\u3053\u3093\u306B\u3061\u306F

# Substitution / variable references
log.dir=${app.home}/logs
config.path=${user.home}/.config/${app.name}
data.dir=${app.home}/data

# Empty values
empty.value=
blank.key=

# Multiline values with backslash continuation
long.text=This is a very long value that \
    spans multiple lines and continues \
    until the end here.

# Special characters in values
url=https://example.com/api?key=value&fmt=json
regex.pattern=^[a-zA-Z0-9]+$
file.path=/usr/local/share/app/config.xml

# HTML color codes
color.primary=#3498DB
color.background=#FFFFFF
color.text=#333333

# Keys with dots (hierarchical)
spring.datasource.url=jdbc:postgresql://localhost/db
spring.datasource.username=admin
spring.datasource.password=secret123

# Mixed separators
key1=value1
key2: value2
key3 value3

# Escape sequences in values
newline.char=line1\nline2
tab.char=col1\tcol2
backslash=C:\\Program Files\\App
unicode.smile=\u263A

# Longer substitution examples
build.output=${project.dir}/build/${build.type}
classpath=${lib.dir}/*.jar:${src.dir}

# Number formats
integer.val=42
negative.val=-100
decimal.val=3.14
